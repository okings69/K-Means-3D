<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisation K-Means 3D</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #101418;
            color: #f6f7fb;
        }
        #canvasHost {
            position: fixed;
            inset: 0;
        }
        #controls {
            position: absolute;
            top: 16px;
            left: 16px;
            width: min(360px, calc(100vw - 32px));
            background: rgba(16, 20, 24, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 8px;
            padding: 16px;
            z-index: 10;
            backdrop-filter: blur(8px);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
        }
        h1 {
            margin: 0 0 12px;
            font-size: 20px;
            font-weight: 700;
        }
        label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            color: #d8dee9;
            font-size: 14px;
        }
        input {
            width: 72px;
            padding: 7px 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: #171d23;
            color: #fff;
            font: inherit;
        }
        .actions {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        button {
            min-height: 36px;
            border: 0;
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            background: #2a9d8f;
            cursor: pointer;
            font-weight: 700;
        }
        button.secondary {
            background: #374151;
        }
        button:disabled {
            opacity: 0.55;
            cursor: wait;
        }
        #status,
        #summary {
            margin: 0 0 10px;
            color: #d8dee9;
            font-size: 14px;
            line-height: 1.35;
        }
        #summary {
            color: #f6f7fb;
            font-weight: 700;
        }
        #results {
            display: grid;
            gap: 8px;
            margin: 0;
            padding: 0;
            list-style: none;
        }
        #results li {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 4px 8px;
            align-items: center;
            padding: 9px 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.07);
            font-size: 14px;
        }
        #results small {
            grid-column: 2;
            color: #b8c0cc;
            font-size: 12px;
        }
        .dot {
            width: 11px;
            height: 11px;
            border-radius: 999px;
        }
    </style>
</head>
<body>
    <div id="canvasHost"></div>

    <section id="controls" aria-label="Controle K-Means">
        <h1>K-Means 3D</h1>
        <label for="clusterCount">
            Nombre de clusters
            <input id="clusterCount" type="number" min="2" max="6" value="4">
        </label>
        <div class="actions">
            <button id="startBtn" type="button">Lancer</button>
            <button id="resetBtn" class="secondary" type="button">Reset</button>
        </div>
        <p id="status">Chargement de la scene...</p>
        <p id="summary">Pret a calculer</p>
        <ul id="results"></ul>
    </section>

    <script defer src="app.js?v=6"></script>
</body>
</html>
